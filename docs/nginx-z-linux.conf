# nginx server block for z-linux.com — sibling to your existing project.
#
# Install path: /etc/nginx/sites-available/z-linux.com
# Enable with:  sudo ln -s /etc/nginx/sites-available/z-linux.com \
#                          /etc/nginx/sites-enabled/z-linux.com
# Test:         sudo nginx -t
# Reload:       sudo systemctl reload nginx
#
# Assumes the static build lands at /var/www/z-linux.com/ (the `dist/` contents).
# The `deploy.sh` script in this repo rsyncs to exactly that path.

server {
    listen       80;
    listen       [::]:80;
    server_name  z-linux.com www.z-linux.com;

    root  /var/www/z-linux.com;
    index index.html;

    # Astro generates /foo/index.html per route — serve /foo/ cleanly.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-lived assets (Vite hashes them). Safe to cache hard.
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML and data JSON must revalidate — they change on every cron commit.
    location ~* \.(html|json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Minor hardening.
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Small niceties.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/z-linux.access.log;
    error_log  /var/log/nginx/z-linux.error.log;
}

# Once TLS is provisioned via certbot (see deploy checklist), this file
# will be rewritten automatically to add `listen 443 ssl;` + cert paths and
# redirect HTTP -> HTTPS. Leave this block in place; `certbot --nginx` edits it
# in-place.
