name: Stability index

on:
  schedule:
    - cron: '45 4 * * *'        # 04:45 UTC — after git-stats (03:30) + CVEs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install numpy pandas semopy
      - name: Fit stability
        run: python scripts/fit-stability.py
      - name: Commit if changed
        run: |
          git config user.name  "cron-bot"
          git config user.email "cron@z-linux.com"
          git add data/stability.json
          git diff --staged --quiet || {
            git commit -m "chore(data): stability fit"
            git push
          }
